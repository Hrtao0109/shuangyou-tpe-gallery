  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  
  if (!usedSet.has(text)) {
    usedSet.add(text);
    el.classList.add('used');
    updateStats();
    // Sync to Supabase (fire and forget)
    SB.from('used_comments').insert({ comment_text: text }).then(() => {});
  }
  
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1200);
}

function showReset() {
  document.getElementById('modal').classList.add('show');
  document.getElementById('pwd').value = '';
  document.getElementById('err').style.display = 'none';
  setTimeout(() => document.getElementById('pwd').focus(), 200);
}

function hideReset() {
  document.getElementById('modal').classList.remove('show');
}

async function sha256(m) { const e=new TextEncoder(); const d=await crypto.subtle.digest('SHA-256',e.encode(m)); return [...new Uint8Array(d)].map(b=>b.toString(16).padStart(2,'0')).join(''); }

async function doReset() {
  const pwd = document.getElementById('pwd').value;
  if (await sha256(pwd) !== PHASH) {
    document.getElementById('err').style.display = 'block';
    return;
  }
  // Delete all from Supabase then clear local
  const { error } = await SB.from('used_comments').delete().neq('id', 0);
  if (!error) {
    usedSet.clear();
    hideReset();
    render(currentFilter, currentSearch);
  } else {
    alert('重置失败: ' + error.message);
  }
}

let currentFilter = 'all';
let currentSearch = '';

function render(filter, search) {
  if (!loaded) return;
  currentFilter = filter;
  currentSearch = search;
  const list = document.getElementById('list');
  list.innerHTML = '';
  let filtered = COMMENTS;
  
  if (filter === 'unused') filtered = filtered.filter(c => !usedSet.has(c));
  else if (filter === 'used') filtered = filtered.filter(c => usedSet.has(c));
  else if (filter !== 'all') filtered = filtered.filter(c => c.includes(filter));
  
  if (search) {
    const s = search.toLowerCase();
    filtered = filtered.filter(c => c.toLowerCase().includes(s));
  }
  
  filtered.forEach(c => {
    const div = document.createElement('div');
    div.className = 'item' + (usedSet.has(c) ? ' used' : '');
    div.textContent = c;
    div.onclick = () => copyText(c, div);
    list.appendChild(div);
  });
  
  updateStats();
}

document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('on'));
    this.classList.add('on');
    render(this.dataset.f, currentSearch);
  });
});

document.getElementById('si').addEventListener('input', function() {
  render(currentFilter, this.value);
});

document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doReset();
});

// Click outside modal to close
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) hideReset();
});

loadUsed();
</script>
