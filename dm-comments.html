<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>DM脚垫 · 文案话术库</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Heiti SC",sans-serif;background:#f5f5f5;color:#333;padding-bottom:60px}
.top{position:sticky;top:0;z-index:10;background:#1a1a1a;color:#fff;padding:14px 16px;text-align:center}
.top h1{font-size:18px;font-weight:600}
.top .s{font-size:13px;color:#aaa;margin-top:4px}
.tabs{position:sticky;top:62px;z-index:9;display:flex;background:#fff;border-bottom:1px solid #e0e0e0}
.tab{flex:1;padding:12px 0;text-align:center;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:#888;transition:.15s}
.tab.on{border-bottom-color:#d32f2f;color:#d32f2f;font-weight:600}
.filters{position:sticky;top:107px;z-index:8;background:#fff;padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #eee}
.filters button{border:1px solid #ddd;background:#fff;padding:5px 12px;border-radius:14px;font-size:12px;cursor:pointer;color:#555}
.filters button.on{background:#d32f2f;color:#fff;border-color:#d32f2f}
.search{padding:8px 16px;background:#fff;border-bottom:1px solid #eee}
.search input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:20px;font-size:14px;outline:none}
.list{padding:8px 0}
.item{padding:14px 16px;border-bottom:1px solid #eee;cursor:pointer;font-size:14px;line-height:1.7;transition:background .15s;-webkit-tap-highlight-color:transparent;white-space:pre-wrap}
.item:active{background:#f0f0f0}
.item.used{color:#d32f2f!important}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:280px;text-align:center}
.modal-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:16px;text-align:center;margin:12px 0;outline:none}
.modal-box button{width:100%;padding:10px;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin:4px 0}
.modal-box .btn-confirm{background:#d32f2f;color:#fff}
.modal-box .btn-cancel{background:#eee;color:#555}
.modal-box .err{color:#d32f2f;font-size:13px;margin-top:4px;display:none}
.float-btn{position:fixed;bottom:20px;right:20px;background:#d32f2f;color:#fff;border:none;padding:10px 18px;border-radius:20px;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:50}
.loading{text-align:center;padding:40px;color:#999;font-size:14px}
</style>
</head>
<body>
<div class="top"><h1>DM注塑TPE脚垫 · 文案话术库</h1><div class="s" id="stats">加载中...</div></div>
<div class="tabs">
  <div class="tab on" data-tab="posts">种草文案</div>
  <div class="tab" data-tab="comments">评论话术</div>
</div>
<div class="filters" id="filters">
  <button class="on" data-f="all">全部</button>
  <button data-f="unused">未使用</button>
  <button data-f="used">已使用</button>
  <button data-f="气味">气味</button>
  <button data-f="贴合">贴合</button>
  <button data-f="清洁">清洁</button>
  <button data-f="暴晒">暴晒</button>
  <button data-f="颜值">颜值</button>
  <button data-f="性价比">性价比</button>
</div>
<div class="search"><input type="text" id="si" placeholder="搜索关键词..."></div>
<div class="list" id="list"><div class="loading">加载中...</div></div>
<div class="toast" id="toast">已复制 ✓</div>
<button class="float-btn" onclick="showReset()">重置全部</button>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 style="margin-bottom:8px">重置已使用记录</h3>
    <p style="font-size:13px;color:#888">输入密码确认</p>
    <input type="password" id="pwd" placeholder="请输入密码">
    <div class="err" id="err">密码错误</div>
    <button class="btn-confirm" onclick="doReset()">确认重置</button>
    <button class="btn-cancel" onclick="hideReset()">取消</button>
  </div>
</div>

<script>
const SB = supabase.createClient('https://pqdpwxlgelfiafwejonz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZHB3eGxnZWxmaWFmd2Vqb256Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzgwMDgsImV4cCI6MjA5NzQ1NDAwOH0.I7DKGNoi9GKNHj9ej-v5dH7G0MFPQPNwzlmWgdSF1jw');
const PHASH = '873c97181831f19f697763f99c92710d63ad55825d793c64880ac60e2fdb8edd';
let items=[], usedIds=new Set(), tab='posts', filter='all', search='';

async function load(){document.getElementById('list').innerHTML='<div class="loading">加载中...</div>';const t=tab;const{data:d}=await SB.from(t).select('id,content').order('id');items=d||[];const{data:u}=await SB.from('used_items').select('item_id').eq('item_type',t);usedIds=new Set((u||[]).map(r=>r.item_id));render();updateStats()}
function updateStats(){const t=items.length,u=usedIds.size;document.getElementById('stats').textContent=(tab==='posts'?'种草文案':'评论话术')+' · '+t+' 条 · '+u+' 条已用'}

async function copyItem(item,el){try{await navigator.clipboard.writeText(item.content)}catch(e){const ta=document.createElement('textarea');ta.value=item.content;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}if(!usedIds.has(item.id)){usedIds.add(item.id);el.classList.add('used');updateStats();SB.from('used_items').insert({item_type:tab,item_id:item.id}).then(()=>{})}const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}

function render(){const list=document.getElementById('list');list.innerHTML='';let f=items;if(filter==='unused')f=f.filter(i=>!usedIds.has(i.id));else if(filter==='used')f=f.filter(i=>usedIds.has(i.id));else if(filter!=='all')f=f.filter(i=>i.content.includes(filter));if(search){const s=search.toLowerCase();f=f.filter(i=>i.content.toLowerCase().includes(s))}f.forEach(i=>{const div=document.createElement('div');div.className='item'+(usedIds.has(i.id)?' used':'');div.textContent=i.content;div.onclick=()=>copyItem(i,div);list.appendChild(div)})}

function showReset(){document.getElementById('modal').classList.add('show');document.getElementById('pwd').value='';document.getElementById('err').style.display='none';setTimeout(()=>document.getElementById('pwd').focus(),200)}
function hideReset(){document.getElementById('modal').classList.remove('show')}
async function sha256(m){const e=new TextEncoder();const d=await crypto.subtle.digest('SHA-256',e.encode(m));return[...new Uint8Array(d)].map(b=>b.toString(16).padStart(2,'0')).join('')}
async function doReset(){const pwd=document.getElementById('pwd').value;if(await sha256(pwd)!==PHASH){document.getElementById('err').style.display='block';return}const{error}=await SB.from('used_items').delete().eq('item_type',tab).neq('id',0);if(!error){usedIds.clear();hideReset();render();updateStats()}else{alert('重置失败: '+error.message)}}

document.querySelectorAll('.tab').forEach(el=>{el.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));this.classList.add('on');tab=this.dataset.tab;filter='all';search='';document.getElementById('si').value='';document.querySelectorAll('#filters button').forEach(b=>b.classList.remove('on'));document.querySelector('#filters button[data-f="all"]').classList.add('on');load()})});
document.querySelectorAll('#filters button').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('#filters button').forEach(b=>b.classList.remove('on'));this.classList.add('on');filter=this.dataset.f;render()})});
document.getElementById('si').addEventListener('input',function(){search=this.value;render()});
document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doReset()});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)hideReset()});
load();
</script>
</body>
</html>
